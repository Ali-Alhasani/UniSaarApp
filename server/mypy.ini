[mypy]
strict = true
python_version = 3.13
plugins = pydantic.mypy
exclude = (source/|tests/testdata/)

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true

# Third-party packages without stubs
[mypy-apscheduler.*]
ignore_missing_imports = true

[mypy-diskcache.*]
ignore_missing_imports = true

[mypy-selectolax.*]
ignore_missing_imports = true

[mypy-slowapi.*]
ignore_missing_imports = true

[mypy-sentry_sdk.*]
ignore_missing_imports = true
