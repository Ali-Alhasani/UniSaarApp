name: iOS 26 Swift 6 CI Pipeline

on:
  pull_request:
    branches: [ main, master, develop ]
  push:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint + SwiftFormat
    runs-on: macos-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache Homebrew
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/Homebrew/downloads
            /usr/local/Cellar/swiftlint
            /usr/local/Cellar/swiftformat
          key: ${{ runner.os }}-brew-${{ hashFiles('.swiftlint.yml', '.swiftformat') }}
          restore-keys: |
            ${{ runner.os }}-brew-

      - name: Install SwiftLint & SwiftFormat
        run: brew install swiftlint swiftformat

      - name: SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging

      - name: SwiftFormat lint
        run: swiftformat --lint iOSApp

  build-and-test:
    name: Build & Test
    # Uses macos-26 to request the newest available Xcode (26.4+ required for
    # UIViewController.updateProperties). If the runner's SDK is still below 26.4
    # the compile step will fail — job is continue-on-error so it never blocks a merge.
    # Remove continue-on-error once macos-26 ships Xcode 26.4+.
    runs-on: macos-26
    timeout-minutes: 45
    needs: lint
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # ── Toolchain setup ───────────────────────────────────────────────────────
      - name: Select Xcode 26.x and check SDK
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE_PATH" ]; then
            echo "Selecting $XCODE_PATH"
            sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          else
            echo "No Xcode 26 found, using default Xcode.app"
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi
          xcodebuild -version
          SDK=$(xcrun --sdk iphonesimulator --show-sdk-version)
          echo "iOS SDK: $SDK"
          MAJOR=$(echo "$SDK" | cut -d. -f1)
          MINOR=$(echo "$SDK" | cut -d. -f2)
          if [ "$MAJOR" -lt 26 ] || { [ "$MAJOR" -eq 26 ] && [ "$MINOR" -lt 4 ]; }; then
            echo "::warning::iOS SDK $SDK is below 26.4. UIViewController.updateProperties() requires iOS 26.4+ — compile will fail. The job is set to continue-on-error and will not block merging."
          else
            echo "iOS SDK $SDK meets the 26.4+ requirement — full build and test will run."
          fi

      - name: Install xcpretty
        run: sudo gem install xcpretty

      # ── SPM dependency cache ──────────────────────────────────────────────────
      - name: Cache Swift Package Manager Dependencies
        uses: actions/cache@v5
        with:
          path: iOSApp/.build
          key: ${{ runner.os }}-spm-${{ hashFiles('iOSApp/**/Package.resolved', 'iOSApp/*.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve Swift Packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "iOSApp/Uni Saar.xcodeproj" \
            -scheme "Uni Saar" \
            -clonedSourcePackagesDirPath iOSApp/.build

      # ── Simulator setup ───────────────────────────────────────────────────────
      - name: Boot Target Simulator
        run: |
          xcrun simctl boot "iPhone 16" || true
          xcrun simctl list devices status booted

      # ── Compilation gate ──────────────────────────────────────────────────────
      - name: Compile (build-for-testing)
        run: |
          set -o pipefail && xcodebuild build-for-testing \
            -project "iOSApp/Uni Saar.xcodeproj" \
            -scheme "Uni Saar" \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -clonedSourcePackagesDirPath iOSApp/.build \
            -parallel-testing-enabled YES \
            CODE_SIGNING_ALLOWED=NO | xcpretty

      # ── Test execution gate ───────────────────────────────────────────────────
      - name: Execute Unit & UI Test Suites
        run: |
          set -o pipefail && xcodebuild test-without-building \
            -project "iOSApp/Uni Saar.xcodeproj" \
            -scheme "Uni Saar" \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -clonedSourcePackagesDirPath iOSApp/.build \
            -parallel-testing-enabled YES \
            CODE_SIGNING_ALLOWED=NO | xcpretty

      # ── Artefact upload (failure only) ────────────────────────────────────────
      - name: Archive Test Failure Logs
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: xcodebuild-test-logs
          path: ~/Library/Developer/Xcode/DerivedData/*/Logs/Test/*.xcresult
